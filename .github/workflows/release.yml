name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      prev_tag: ${{ steps.version.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Detect version bump
        id: version
        run: |
          set -euo pipefail

          VERSION=$(cargo metadata --format-version=1 --no-deps \
            | jq -r '.packages[] | select(.name == "sotb") | .version')

          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Failed to parse package version from cargo metadata" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${PREV_TAG:-<none>}"

          if git rev-parse "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v${VERSION} does not exist — will release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install SDL3 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl3-dev pkg-config

      - name: Install SDL3 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl3

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package archive
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          # Assets are embedded in the binary via include_bytes! — ship the binary alone.
          ARCHIVE="sotb-${VERSION}-${TARGET}.tar.gz"
          tar czf "$ARCHIVE" -C target/release sotb
          ls -la "$ARCHIVE"

      - uses: actions/upload-artifact@v7
        with:
          name: sotb-${{ needs.prepare.outputs.version }}-${{ matrix.target }}
          path: sotb-${{ needs.prepare.outputs.version }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: sotb-${{ needs.prepare.outputs.version }}-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PREV_TAG: ${{ needs.prepare.outputs.prev_tag }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          assets=(artifacts/*.tar.gz)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release archives found under artifacts/" >&2
            find artifacts -type f || true
            exit 1
          fi

          notes_args=(--generate-notes)
          if [[ -n "${PREV_TAG}" ]]; then
            notes_args+=(--notes-start-tag "${PREV_TAG}")
          fi

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --target "${GITHUB_SHA}" \
            "${notes_args[@]}" \
            "${assets[@]}"
